<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine Image Model</title>
    <!-- นำเข้า Google Fonts เพื่อความสวยงาม -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #4F46E5;
            --primary-hover: #4338CA;
            --bg-color: #F9FAFB;
            --card-bg: #FFFFFF;
            --text-color: #1F2937;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: #111827;
        }

        .btn-start {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.4);
            width: 100%;
            margin-bottom: 20px;
        }

        .btn-start:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-start:active {
            transform: translateY(1px);
        }

        #webcam-container {
            margin: 20px auto;
            border-radius: 12px;
            overflow: hidden;
            width: 200px;
            height: 200px;
            background-color: #E5E7EB;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.06);
        }

        #webcam-container canvas {
            border-radius: 12px;
            display: block;
        }

        #label-container {
            margin-top: 20px;
            text-align: left;
        }

        .prediction-item {
            background-color: #F3F4F6;
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 0.95rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid var(--primary-color);
        }

        .prediction-name {
            font-weight: 600;
        }

        .prediction-value {
            font-family: monospace;
            background: #E5E7EB;
            padding: 2px 6px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Teachable Machine Image Model</h1>
    <button type="button" class="btn-start" onclick="init()">เปิดใช้งานกล้อง</button>
    
    <div id="webcam-container">
        <!-- กล้องจะแสดงตรงนี้ -->
    </div>
    
    <div id="label-container">
        <!-- ผลลัพธ์จะแสดงตรงนี้ -->
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script type="text/javascript">
    const URL = "https://teachablemachine.withgoogle.com/models/PpBKjaoaf/";

    let model, webcam, labelContainer, maxPredictions;
    let lastPredictTime = 0; // ตัวแปรเก็บเวลาล่าสุดที่ทายผล

    async function init() {
        // ซ่อนปุ่มหลังจากกดเพื่อป้องกันการกดซ้ำ
        document.querySelector('.btn-start').style.display = 'none';

        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        const flip = true; 
        webcam = new tmImage.Webcam(200, 200, flip); 
        await webcam.setup(); 
        await webcam.play();
        window.requestAnimationFrame(loop);

        document.getElementById("webcam-container").innerHTML = ""; // ล้างข้อความข้างในก่อนใส่กล้อง
        document.getElementById("webcam-container").appendChild(webcam.canvas);
        
        labelContainer = document.getElementById("label-container");
        labelContainer.innerHTML = ""; // ล้างข้อมูลเก่า
        for (let i = 0; i < maxPredictions; i++) { 
            const div = document.createElement("div");
            div.className = "prediction-item";
            labelContainer.appendChild(div);
        }
    }

    async function loop(timestamp) {
        webcam.update(); 

        // ตรวจสอบว่าเวลาผ่านไปครบ 3,000 มิลลิวินาที (3 วินาที) หรือยัง
        if (timestamp - lastPredictTime >= 3000) {
            await predict();
            lastPredictTime = timestamp; // อัปเดตเวลาล่าสุด
        }

        window.requestAnimationFrame(loop);
    }

    async function predict() {
        const prediction = await model.predict(webcam.canvas);
        for (let i = 0; i < maxPredictions; i++) {
            const classText = prediction[i].className;
            const probabilityText = (prediction[i].probability * 100).toFixed(0) + "%"; // ปรับแสดงเป็นเปอร์เซ็นต์ให้ดูง่าย
            
            labelContainer.childNodes[i].innerHTML = `
                <span class="prediction-name">${classText}</span>
                <span class="prediction-value">${probabilityText}</span>
            `;
        }
    }
</script>

</body>
</html>
